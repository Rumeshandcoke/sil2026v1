import { createRoot } from 'react-dom/client';

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYGN_tvRRadnWNM6Osrpcx4tq4HoibvJCLUEEPcbOx5IBoRw7JCWCqe3N3KLZ7GLmu/exec';
const MASTER_SHEET_ID = '16evdSZDgIx7DkP3X7rxzkT8p8YtXsLykdIPXeIXhxxM';

const generateBabyId = () => String(Date.now()).slice(-10);
const generateScreeningId = () => {
  const year = new Date().getFullYear().toString().slice(-2);
  const uniqueDigits = String(Date.now()).slice(-10);
  return `S-${year}-${uniqueDigits}`;
};

const fetchMasterData = async () => {
  try {
    const baseUrl = `https://docs.google.com/spreadsheets/d/${MASTER_SHEET_ID}/gviz/tq?tqx=out:json`;
    const [hwRes, hospRes, devRes] = await Promise.all([
      fetch(`${baseUrl}&gid=1307397658`),
      fetch(`${baseUrl}&gid=1533063125`),
      fetch(`${baseUrl}&gid=1397829803`)
    ]);
    const parse = async (r) => {
      const text = await r.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      return json.table.rows.map(row => row.c.map(cell => cell ? cell.v : ''));
    };
    const [hwData, hospData, devData] = await Promise.all([parse(hwRes), parse(hospRes), parse(devRes)]);
    return { healthcareWorkers: hwData.slice(1), hospitals: hospData.slice(1), devices: devData.slice(1) };
  } catch (error) {
    console.error('Error fetching master data:', error);
    throw error;
  }
};

const fetchOperatorStats = async (operatorId) => {
  try {
    const url = `${SCRIPT_URL}?action=getStats&operatorId=${encodeURIComponent(operatorId)}`;
    const response = await fetch(url);
    return await response.json();
  } catch (error) {
    console.error('Error fetching stats:', error);
    return { last30Days: 0, currentMonth: 0, monthName: '' };
  }
};

const LoginScreen = ({ masterData, onLogin }) => {
  const [form, setForm] = useState({ username: '', password: '' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = () => {
    setError('');
    setLoading(true);

    const user = masterData.healthcareWorkers.find(hw => 
      hw[0] === form.username && hw[1] === form.password
    );

    if (user) {
      onLogin({
        hwId: user[0],
        password: user[1],
        hwName: user[2],
        ngo: user[3]
      });
    } else {
      setError('Invalid username or password');
      setLoading(false);
    }
  };

  return React.createElement('div', { className: "min-h-screen flex flex-col" },

const BabyRegistrationScreen = ({ user, initialData, onBack, onNext, onClear, onProfileClick }) => {
  const [form, setForm] = useState({
    babyId: initialData.babyId || generateBabyId(),
    babyName: initialData.babyName || '',
    dateOfBirth: initialData.dateOfBirth || '',
    gender: initialData.gender || '',
    gestationalAge: initialData.gestationalAge || '',
    parentName: initialData.parentName || '',
    parentPhone: initialData.parentPhone || '',
    parentEmail: initialData.parentEmail || '',
    riskFactors: initialData.riskFactors || []
  });

  const [errors, setErrors] = useState({});

  const riskOptions = [
    "NICU > 5 days",
    "Family history of hearing loss",
    "Craniofacial anomalies",
    "In utero infections",
    "Hyperbilirubinemia",
    "Syndromes associated with hearing loss"
  ];

  const toggleRisk = (risk) => {
    setForm({
      ...form,
      riskFactors: form.riskFactors.includes(risk)
        ? form.riskFactors.filter(r => r !== risk)
        : [...form.riskFactors, risk]
    });
  };

  const validate = () => {
    const newErrors = {};
    if (!form.babyName.trim()) newErrors.babyName = "Required";
    if (form.babyName && !/^[a-zA-Z\s.\-]+$/.test(form.babyName)) {
      newErrors.babyName = "Only letters, spaces, hyphens and periods allowed";
    }
    if (!form.dateOfBirth) newErrors.dateOfBirth = "Required";
    if (!form.gender) newErrors.gender = "Required";
    if (!form.gestationalAge) newErrors.gestationalAge = "Required";
    if (!form.parentName.trim()) newErrors.parentName = "Required";
    if (!form.parentPhone.trim() || !/^\d{10}$/.test(form.parentPhone)) {
      newErrors.parentPhone = "Enter 10-digit number";
    }

    const dob = new Date(form.dateOfBirth);
    const today = new Date();
    if (dob > today) {
      newErrors.dateOfBirth = "Cannot be in future";
    }

    setErrors(newErrors);
    return Object.keys(newErrors).length === 0;
  };

  const handleNext = () => {
    if (validate()) {
      onNext({ ...form, riskFactors: form.riskFactors, screeningId: generateScreeningId() });
    }
  };

  return React.createElement('div', { className: "min-h-screen flex flex-col pb-24" },
    React.createElement(Header, { 
      title: "Baby Registration", 
      onBack: onBack,
      user: user,
      onProfileClick: onProfileClick
    }),
    React.createElement(Container, {},
      React.createElement(Card, {},
        React.createElement('div', { className: "space-y-4" },
          React.createElement(Input, {
            label: "Baby ID",
            value: form.babyId,
            disabled: true,
            className: "opacity-50 font-mono"
          }),
          React.createElement(Input, {
            label: "Baby Name *",
            value: form.babyName,
            onChange: (e) => setForm({ ...form, babyName: e.target.value }),
            placeholder: "Enter baby's name",
            error: errors.babyName
          }),
          React.createElement(Input, {
            label: "Date of Birth *",
            type: "date",
            value: form.dateOfBirth,
            max: new Date().toISOString().split('T')[0],
            onChange: (e) => setForm({ ...form, dateOfBirth: e.target.value }),
            error: errors.dateOfBirth
          }),
          React.createElement(RadioGroup, {
            label: "Gender *",
            value: form.gender,
            onChange: (v) => setForm({ ...form, gender: v }),
            options: [{label:'M',value:'Male'},{label:'F',value:'Female'},{label:'O',value:'Other'}]
          }),
          React.createElement(Select, {
            label: "Gestational Age (weeks) *",
            value: form.gestationalAge,
            onChange: (e) => setForm({ ...form, gestationalAge: e.target.value }),
            error: errors.gestationalAge
          },
            React.createElement('option', { value: '' }, "Select weeks"),
            Array.from({ length: 26 }, (_, i) => i + 25).map(w =>
              React.createElement('option', { key: w, value: w }, w)
            )
          ),
          React.createElement(Input, {
            label: "Parent/Guardian Name",
            value: form.parentName,
            onChange: (e) => setForm({ ...form, parentName: e.target.value }),
            placeholder: "Enter parent's name *",
            error: errors.parentName
          }),
          React.createElement(Input, {
            label: "Phone Number *",
            type: "tel",
            value: form.parentPhone,
            onChange: (e) => setForm({ ...form, parentPhone: e.target.value.replace(/\D/g, '') }),
            placeholder: "10-digit number",
            maxLength: "10",
            error: errors.parentPhone
          }),
          React.createElement(Input, {
            label: "Email (Optional)",
            type: "email",
            value: form.parentEmail,
            onChange: (e) => setForm({ ...form, parentEmail: e.target.value }),
            placeholder: "parent@example.com"
          }),
          React.createElement('div', {},
            React.createElement('label', { className: "text-sm font-medium text-gray-700 ml-1 mb-2 block" }, "Risk Factors (Select all that apply)"),
            React.createElement('div', { className: "space-y-2" },
              riskOptions.map(risk =>
                React.createElement('label', { key: risk, className: "flex items-center gap-3 p-3 bg-secondary rounded-xl cursor-pointer hover:bg-gray-200 transition-colors" },
                  React.createElement('input', {
                    type: "checkbox",
                    checked: form.riskFactors.includes(risk),
                    onChange: () => toggleRisk(risk),
                    className: "w-5 h-5 text-primary rounded focus:ring-2 focus:ring-primary/20"
                  }),
                  React.createElement('span', { className: "text-sm text-gray-700" }, risk)
                )
              )
            )
          ),
          React.createElement('div', { className: "flex gap-3 pt-2" },
            React.createElement(Button, {
              variant: "secondary",
              onClick: onClear
            }, "Clear All Fields"),
            React.createElement(Button, {
              onClick: handleNext
            }, "Next")
          )
        )
      )
    )
  );
};

const STEP = {
  LOADING: 'LOADING',
  LOGIN: 'LOGIN',
  SESSION: 'SESSION',
  MENU: 'MENU',
  BABY: 'BABY',
  TEST_SELECT: 'TEST_SELECT',
  AABR: 'AABR',
  OAE_TYPE: 'OAE_TYPE',
  OAE_PROTOCOL: 'OAE_PROTOCOL',
  OAE: 'OAE',
  REC: 'REC',
  SUCCESS: 'SUCCESS'
};

const saveToSheets = async (record) => {
  try {
    const response = await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(record)
    });
    return true;
  } catch (error) {
    console.error('Error saving to sheets:', error);
    return false;
  }
};

const App = () => {
  const [step, setStep] = useState(STEP.LOADING);
  const [masterData, setMasterData] = useState(null);
  const [user, setUser] = useState(null);
  const [record, setRecord] = useState({});
  const [showProfile, setShowProfile] = useState(false);

  useEffect(() => {
    const loadMasterData = async () => {
      try {
        const data = await fetchMasterData();
        setMasterData(data);
        setStep(STEP.LOGIN);
      } catch (error) {
        alert('Failed to load master data. Please refresh the page.');
      }
    };
    loadMasterData();
  }, []);

  const merge = (data) => setRecord({ ...record, ...data });

  const clearBabyData = () => {
    const { babyId, babyName, dateOfBirth, gender, gestationalAge, parentName, parentPhone, parentEmail, riskFactors, screeningId, testType, ...rest } = record;
    setRecord({ ...rest, babyId: generateBabyId() });
    setStep(STEP.BABY);
  };

  const handleLogin = (userData) => {
    setUser(userData);
    setStep(STEP.SESSION);
  };

  const handleSubmit = async (data) => {
    const final = { ...record, ...data };
    const ok = await saveToSheets(final);
    if (ok) {
      setStep(STEP.SUCCESS);
    } else {
      alert('Failed to save. Please try again.');
    }
  };

  if (step === STEP.LOADING) {
    return React.createElement('div', { className: "min-h-screen flex items-center justify-center" },
      React.createElement('div', { className: "text-center" },
        React.createElement('div', { className: "text-xl text-gray-600" }, "Loading...")
      )
    );
  }

  return React.createElement('div', {},
    React.createElement(VersionWatermark),
    step === STEP.LOGIN && React.createElement(LoginScreen, { masterData, onLogin: handleLogin }),
    step === STEP.SESSION && React.createElement(SessionSetupScreen, { user, masterData, initialData: record, onComplete: d => { merge(d); setStep(STEP.MENU); } }),
    step === STEP.MENU && React.createElement(MenuScreen, { user, onRegisterBaby: () => setStep(STEP.BABY), onProfileClick: () => setShowProfile(true) }),
    step === STEP.BABY && React.createElement(BabyRegistrationScreen, { user, initialData: record, onBack: () => setStep(STEP.MENU), onNext: d => { merge(d); setStep(STEP.TEST_SELECT); }, onClear: clearBabyData, onProfileClick: () => setShowProfile(true) }),
    step === STEP.TEST_SELECT && React.createElement(TestSelectionScreen, { user, onBack: () => setStep(STEP.BABY), onSelectAABR: () => setStep(STEP.AABR), onSelectOAE: () => setStep(STEP.OAE_TYPE), onProfileClick: () => setShowProfile(true) }),
    step === STEP.AABR && React.createElement(AABREntryScreen, { user, initialData: record, onBack: () => setStep(STEP.TEST_SELECT), onNext: d => { merge(d); setStep(STEP.REC); }, onProfileClick: () => setShowProfile(true) }),
    step === STEP.OAE_TYPE && React.createElement(OAETypeScreen, { user, onBack: () => setStep(STEP.TEST_SELECT), onNext: d => { merge(d); setStep(STEP.OAE_PROTOCOL); }, onProfileClick: () => setShowProfile(true) }),
    step === STEP.OAE_PROTOCOL && React.createElement(OAEProtocolScreen, { user, oaeType: record.oaeTestType, onBack: () => setStep(STEP.OAE_TYPE), onNext: d => { merge(d); setStep(STEP.OAE); }, onProfileClick: () => setShowProfile(true) }),
    step === STEP.OAE && (record.oaeTestType === 'DPOAE'
      ? React.createElement(DPOAEEntryScreen, { user, protocol: record.oaeProtocol, onBack: () => setStep(STEP.OAE_PROTOCOL), onNext: d => { merge(d); setStep(STEP.REC); }, onProfileClick: () => setShowProfile(true) })
      : React.createElement(TEOAEEntryScreen, { user, protocol: record.oaeProtocol, onBack: () => setStep(STEP.OAE_PROTOCOL), onNext: d => { merge(d); setStep(STEP.REC); }, onProfileClick: () => setShowProfile(true) })
    ),
    step === STEP.REC && React.createElement(RecommendationScreen, { user, record, onBack: () => setStep(record.testType === 'AABR' ? STEP.AABR : STEP.OAE), onSubmit: handleSubmit, onProfileClick: () => setShowProfile(true) }),
step === STEP.SUCCESS && React.createElement(SuccessScreen, { user, record, onNewScreening: () => { const sessionData = { hwName: record.hwName, hwId: record.hwId, ngo: record.ngo, hospitalName: record.hospitalName, deviceSerial: record.deviceSerial, sessionDate: record.sessionDate }; setRecord(sessionData); setStep(STEP.MENU); }, onProfileClick: () => setShowProfile(true) }),
    showProfile && user && React.createElement(ProfileModal, { user, onClose: () => setShowProfile(false) })
  );
};

const root = createRoot(document.getElementById('root'));
root.render(React.createElement(App));
    </script>
